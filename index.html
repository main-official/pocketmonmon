<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Pocket Monmon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">

    <!-- HUD -->
    <header id="hud">
      <div id="hud-left">
        <span id="hud-name">Pocket Monmon</span>
        <span id="hud-stage">Choose your egg</span>
      </div>
      <div id="hud-right">
        <div id="day-badge">
          <span id="day-count">Day 0</span>
        </div>
        <button id="gear-btn" title="Settings" aria-label="Settings">ℹ️</button>
      </div>
    </header>

    <!-- Growth progress bar -->
    <div id="growth-wrap">
      <div id="growth-bar"><div id="growth-fill"></div></div>
      <span id="growth-label">0 / 14 days</span>
    </div>

    <!-- Game canvas -->
    <canvas id="game"></canvas>

    <!-- Hint text -->
    <div id="hint">Dedicated to my little bee!</div>
  </div>

  <!-- Naming modal -->
  <div id="modal-overlay" class="hidden">
    <div class="modal">
      <div class="modal-emoji">🐣</div>
      <h2>It hatched!</h2>
      <p>Give your little salmon a name to begin its journey.</p>
      <input id="name-input" maxlength="16" placeholder="e.g. Pip" autocomplete="off" />
      <button id="name-confirm">Let's go!</button>
    </div>
  </div>

  <!-- Stage-up celebration modal -->
  <div id="stageup-overlay" class="hidden">
    <div class="modal">
      <div class="modal-emoji" id="stageup-emoji">🎉</div>
      <h2 id="stageup-title">Grew up!</h2>
      <p id="stageup-text"></p>
      <button id="stageup-confirm">Yay!</button>
    </div>
  </div>

  <!-- Settings drawer -->
  <div id="settings-overlay" class="hidden">
    <div class="modal">
      <div class="modal-emoji">ℹ️</div>
      <h2>Info</h2>
      <p class="settings-sub">Your pet swims on its own! Drag to guide it, and swipe to jump!</p>
      <button id="skip-day-btn" class="secondary-btn">⏩ Skip forward 1 day</button>
      <button id="reset-btn" class="secondary-btn danger">🗑️ Release &amp; start over</button>
      <button id="settings-close" class="text-btn">Close</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
